<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CivicAI – Your non-partisan guide to the election process, voter registration, and civic participation." />
    <meta name="keywords" content="Election Process Communication, Voter Education, Civic Tech, Hack2Skill, Democracy" />
    <title>CivicAI – Election Process Education</title>

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MEASUREMENT_ID');
    </script>

    <!--
      Google Translate Element API (official Google resource)
      Polls every 100ms until React mounts #google_translate_element in the
      Navbar, then initialises the widget there — keeping it in the header.
    -->
    <script>
      function googleTranslateElementInit() {
        var attempts = 0;
        var maxAttempts = 50; // 5 seconds max
        var interval = setInterval(function () {
          var el = document.getElementById('google_translate_element');
          attempts++;
          if (el) {
            clearInterval(interval);
            new google.translate.TranslateElement(
              {
                pageLanguage: 'en',
                includedLanguages: 'es,fr,de,zh-CN,hi,ar,pt,ja,ko,ru,it,nl,tr',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false,
                multilanguagePage: true,
              },
              'google_translate_element'
            );
          } else if (attempts >= maxAttempts) {
            clearInterval(interval);
          }
        }, 100);
      }
    </script>
    <script async
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
